<!DOCTYPE html> <html lang="zh"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>植物MBTI性格测试</title> <style> body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto; background:#f4f9f4; color:#333; } .container{ max-width:600px; margin:auto; padding:20px; } .card{ background:#fff; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.05); } h1,h2{ text-align:center; } button{ background:#7fc97f; border:none; padding:12px 18px; margin:8px; border-radius:20px; color:white; font-size:16px; cursor:pointer; } button.secondary{ background:#a8d5ba; } button:disabled{ background:#ccc; } .option{ display:block; padding:12px; margin:10px 0; border-radius:12px; border:1px solid #ddd; cursor:pointer; } .option.active{ background:#dff5e1; border-color:#7fc97f; } .progress{ text-align:center; margin-bottom:10px; color:#666; } .result{ line-height:1.6; } .actions{ text-align:center; margin-top:20px; } @media(max-width:600px){ button{ width:100%; } } </style> </head> <body> <div class="container"> <div id="app"></div> </div> <script> const questions = [ {q:"你更喜欢怎样开始一天？",dim:"EI",a:["与人聊天","参加活动","独自安静","慢慢进入状态"]}, {q:"社交场合中你通常？",dim:"EI",a:["主动交流","带动气氛","观察为主","只和熟人聊"]}, {q:"休息日你更倾向？",dim:"EI",a:["外出活动","约朋友","宅在家","独处放松"]}, {q:"你更容易？",dim:"EI",a:["快速融入人群","结识新朋友","保持距离","独自思考"]}, {q:"你更关注？",dim:"SN",a:["现实细节","具体信息","未来可能","抽象想法"]}, {q:"做决定时你依赖？",dim:"SN",a:["经验","事实","灵感","直觉"]}, {q:"你更喜欢？",dim:"SN",a:["稳定环境","实际操作","探索新点子","想象未来"]}, {q:"你更看重？",dim:"SN",a:["实际效果","细节准确","创意可能","整体概念"]}, {q:"面对冲突你更倾向？",dim:"TF",a:["理性分析","讲道理","顾及感受","避免伤害"]}, {q:"做选择时你更看重？",dim:"TF",a:["逻辑","效率","情感","关系"]}, {q:"你更容易？",dim:"TF",a:["客观判断","直言不讳","体谅他人","感性决定"]}, {q:"你更认可？",dim:"TF",a:["公平规则","结果导向","人情关怀","和谐氛围"]}, {q:"你更喜欢？",dim:"JP",a:["计划明确","按部就班","灵活安排","随性而行"]}, {q:"面对任务你通常？",dim:"JP",a:["提前完成","有条理","临时发挥","边做边想"]}, {q:"你更倾向？",dim:"JP",a:["稳定秩序","掌控局面","保持开放","随机应变"]}, {q:"你更舒适？",dim:"JP",a:["确定安排","清晰目标","自由变化","不设限制"]} ]; const resultMap = { "ESTJ":["冬青型","务实严谨、负责可靠，像冬青般坚韧"], "ESFJ":["康乃馨型","温暖热忱、善于关怀"], "ISTJ":["松柏型","沉稳内敛、踏实专一"], "ISFJ":["铃兰型","温柔体贴、细腻共情"], "ESTP":["蒲公英型","活泼好动、灵活多变"], "ESFP":["月季型","热情明媚、热爱生活"], "ISTP":["芦荟型","冷静理智、独立能干"], "ISFP":["雏菊型","温柔内敛、热爱美好"], "ENTJ":["向日葵型","自信果断、领导力强"], "ENFJ":["郁金香型","善解人意、善于引导"], "INTJ":["君子兰型","理性深邃、目标明确"], "INFJ":["风信子型","敏感通透、富有洞察力"], "ENTP":["满天星型","思维活跃、乐于创新"], "ENFP":["风铃草型","浪漫乐观、热爱自由"], "INTP":["文竹型","冷静思考、热爱探索"], "INFP":["薰衣草型","温柔浪漫、内心丰富"] }; let current = 0; let answers = Array(16).fill(null); function renderHome(){ document.getElementById("app").innerHTML=` <div class="card"> <h1>🌿植物MBTI性格测试</h1> <p>发现你的植物人格类型，探索内心性格。</p > <div class="actions"> <button onclick="start()">开始测试</button> </div> </div>`; } function start(){ current=0; answers.fill(null); renderQuestion(); } function renderQuestion(){ let q = questions[current]; let html = `<div class="card"> <div class="progress">第 ${current+1} / 16 题</div> <h2>${q.q}</h2>`; q.a.forEach((opt,i)=>{ html+=`<div class="option ${answers[current]===i?'active':''}" onclick="select(${i})">${opt}</div>`; }); html+=`<div class="actions"> <button class="secondary" onclick="prev()" ${current===0?'disabled':''}>上一题</button> <button onclick="next()" ${answers[current]===null?'disabled':''}>下一题</button> </div></div>`; document.getElementById("app").innerHTML=html; } function select(i){ answers[current]=i; renderQuestion(); } function prev(){ current--; renderQuestion();} function next(){ if(current<15){current++;renderQuestion();} else calc(); } function calc(){ let score = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; answers.forEach((ans,i)=>{ let dim = questions[i].dim; if(dim==="EI"){ if(ans<2) score.E++; else score.I++; } if(dim==="SN"){ if(ans<2) score.S++; else score.N++; } if(dim==="TF"){ if(ans<2) score.T++; else score.F++; } if(dim==="JP"){ if(ans<2) score.J++; else score.P++; } }); let type = (score.E>=score.I?"E":"I")+ (score.S>=score.N?"S":"N")+ (score.T>=score.F?"T":"F")+ (score.J>=score.P?"J":"P"); let r = resultMap[type]; document.getElementById("app").innerHTML=` <div class="card result"> <h2>${type} · ${r[0]}</h2> <p>${r[1]}</p > <hr> <p><b>维度分析：</b><br> E:${score.E} I:${score.I}<br> S:${score.S} N:${score.N}<br> T:${score.T} F:${score.F}<br> J:${score.J} P:${score.P} </p > <div class="actions"> <button onclick="restart()">重新测试</button> <button onclick="copyResult('${type} ${r[0]} ${r[1]}')">复制结果</button> <button onclick="share()">分享</button> </div> </div>`; } function restart(){ renderHome(); } function copyResult(text){ navigator.clipboard.writeText(text); alert("已复制！"); } function share(){ if(navigator.share){ navigator.share({ title:"植物MBTI测试", text:"来测测你的植物人格！", url:location.href }); }else{ alert("请手动分享到微信"); } } renderHome(); </script> </body> </html>
